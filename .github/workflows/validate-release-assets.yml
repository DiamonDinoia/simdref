name: Validate Release Assets

# Runs after Build Data & Deploy completes successfully. Pulls the
# freshly-published data-latest assets and executes the full test suite
# against them. This is the independent signal that "the thing we just
# published is consumable end-to-end".

on:
  workflow_run:
    workflows: ["Build Data & Deploy"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: validate-release-assets-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    if: github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          activate-environment: true
          python-version: "3.12"

      - name: Install package and test dependencies
        run: uv pip install -e . pytest

      - name: Verify upstream Build Data build job succeeded
        id: check-release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          run_id="${{ github.event.workflow_run.id }}"
          if [ -n "$run_id" ]; then
            build_conclusion=$(gh api "repos/${{ github.repository }}/actions/runs/$run_id/jobs" \
              --jq '.jobs[] | select(.name=="build") | .conclusion' 2>/dev/null || echo "")
            echo "upstream build job conclusion: ${build_conclusion:-<unknown>}"
            if [ "$build_conclusion" != "success" ]; then
              echo "::warning::upstream build job did not succeed (conclusion=${build_conclusion:-none}); nothing to validate."
              echo "available=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi
          if gh release view data-latest --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::data-latest release not found — nothing to validate."
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Pull data-latest (the catalog that was just published)
        if: steps.check-release.outputs.available == 'true'
        run: simdref update --from-release --man-dir "$RUNNER_TEMP/man"

      - name: Full test suite against released catalog
        if: steps.check-release.outputs.available == 'true'
        run: python -m pytest tests

      - name: Sanity-run the CLI
        if: steps.check-release.outputs.available == 'true'
        run: |
          simdref doctor
          simdref llm query _mm_add_epi32 || true
          simdref annotate --help
