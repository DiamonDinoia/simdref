name: Deploy Pages

# Publishes the static web bundle to GitHub Pages whenever Build Data &
# Deploy publishes a fresh data-latest release. Falls back to building
# the catalog locally on workflow_dispatch so the first deploy can run
# before any release exists.

on:
  workflow_run:
    workflows: ["Build Data & Deploy"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          activate-environment: true
          python-version: "3.12"

      - run: uv pip install -e .

      - name: Download published catalog from data-latest release
        id: pull-release
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p data/derived
          gh release download data-latest \
            --repo "${{ github.repository }}" \
            --pattern 'catalog.msgpack' \
            --pattern 'catalog.db' \
            --dir data/derived \
            --clobber

      - name: Install LLVM 22 toolchain (fallback build)
        if: steps.pull-release.outcome != 'success'
        run: |
          wget -qO /tmp/llvm.sh https://apt.llvm.org/llvm.sh
          chmod +x /tmp/llvm.sh
          sudo /tmp/llvm.sh 22
          echo "/usr/lib/llvm-22/bin" >> "$GITHUB_PATH"

      - name: Vendor RISC-V sources (fallback build)
        if: steps.pull-release.outcome != 'success'
        run: |
          git clone --depth 1 https://github.com/riscv/riscv-unified-db /tmp/riscv-unified-db
          git clone --depth 1 https://github.com/riscv-non-isa/riscv-rvv-intrinsic-doc /tmp/riscv-rvv-intrinsic-doc
          python tools/vendor_riscv_sources.py

      - name: Build catalog locally (fallback build)
        if: steps.pull-release.outcome != 'success'
        run: python -u -m simdref build --with-sdm --man-dir "$RUNNER_TEMP/man"

      - name: Rebuild static web bundle from catalog
        run: |
          python - <<'PY'
          from simdref.storage import WEB_DIR, load_catalog
          from simdref.web import export_web
          catalog = load_catalog()
          export_web(catalog, WEB_DIR)
          print(f"exported {len(catalog.intrinsics)} intrinsics, {len(catalog.instructions)} instructions")
          PY

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: web/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
