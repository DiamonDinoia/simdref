name: Deploy Pages

# Publishes the static web bundle to GitHub Pages whenever Build Data &
# Deploy publishes a fresh data-latest release. Every push to main
# triggers Build Data & Deploy, which refreshes data-latest, which
# triggers this workflow — so Pages stays in lockstep with main.

on:
  workflow_run:
    workflows: ["Build Data & Deploy"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          activate-environment: true
          python-version: "3.12"

      - run: uv pip install -e .

      - name: Check data-latest release exists
        id: check-release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view data-latest --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::data-latest release not found — Build Data & Deploy has not yet published. Skipping deploy."
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Download published catalog from data-latest release
        if: steps.check-release.outputs.available == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p data/derived
          gh release download data-latest \
            --repo "${{ github.repository }}" \
            --pattern 'catalog.msgpack' \
            --pattern 'catalog.db' \
            --dir data/derived \
            --clobber

      - name: Rebuild static web bundle from catalog
        if: steps.check-release.outputs.available == 'true'
        run: |
          python - <<'PY'
          from simdref.storage import WEB_DIR, load_catalog
          from simdref.web import export_web
          catalog = load_catalog()
          export_web(catalog, WEB_DIR)
          print(f"exported {len(catalog.intrinsics)} intrinsics, {len(catalog.instructions)} instructions")
          PY

      - name: Upload Pages artifact
        if: steps.check-release.outputs.available == 'true'
        uses: actions/upload-pages-artifact@v5
        with:
          path: web/

      - name: Deploy to GitHub Pages
        if: steps.check-release.outputs.available == 'true'
        id: deployment
        uses: actions/deploy-pages@v5
