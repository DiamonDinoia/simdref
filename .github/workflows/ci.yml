name: CI

on:
  pull_request:
  push:
    branches-ignore:
      - gh-pages

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v8.0.0
        with:
          enable-cache: true
          activate-environment: true
          python-version: "3.12"

      - name: Install package and test dependencies
        run: uv pip install -e . pytest

      - name: Prime catalog from bundled fixtures
        # Build a small-but-complete offline catalog so tests exercise the
        # freshly-ingested data (including Arm NEON) rather than whatever
        # historical release catalog happens to be on GitHub.
        run: python -m simdref update --offline --man-dir "$RUNNER_TEMP/man"

      - name: Run Python test suite
        run: python -m pytest tests

      - name: Run offline source validation
        run: python tools/validate_sources.py --offline

      - name: Check Python syntax
        run: python -m py_compile src/simdref/cli.py src/simdref/display.py src/simdref/ingest.py src/simdref/pdfparse/base.py src/simdref/pdfparse/intel.py src/simdref/tui.py src/simdref/web.py

      - name: Check web syntax
        run: node --check src/simdref/templates/app.js

  runtime-build:
    name: Runtime Validation
    needs: tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        label: [release-assets, local-sdm]
        include:
          - label: release-assets
            build_command: simdref update --man-dir "$RUNNER_TEMP/man"
            intrinsics_min: 1000
            instructions_min: 1000
          - label: local-sdm
            build_command: simdref update --build-local --with-sdm --man-dir "$RUNNER_TEMP/man"
            intrinsics_min: 7000
            instructions_min: 20000
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v8.0.0
        with:
          enable-cache: true
          activate-environment: true
          python-version: "3.12"

      - name: Install package
        run: uv pip install -e .

      - name: Build runtime (${{ matrix.label }})
        run: ${{ matrix.build_command }}

      - name: Validate upstream source ingestion (${{ matrix.label }})
        if: matrix.label == 'local-sdm'
        run: python tools/validate_sources.py --require-sdm

      - name: Inspect runtime (${{ matrix.label }})
        run: simdref doctor

      - name: Validate runtime artifacts (${{ matrix.label }})
        env:
          EXPECTED_INTRINSICS_MIN: ${{ matrix.intrinsics_min }}
          EXPECTED_INSTRUCTIONS_MIN: ${{ matrix.instructions_min }}
        run: |
          python - <<'PY'
          import os
          import json
          from simdref.storage import SQLITE_PATH, WEB_DIR, open_db, sqlite_schema_is_current

          assert sqlite_schema_is_current(), "SQLite schema is not current after update"
          with open_db(SQLITE_PATH) as conn:
              intrinsics = conn.execute("select count(*) from intrinsics_data").fetchone()[0]
              instructions = conn.execute("select count(*) from instructions_data").fetchone()[0]
          assert intrinsics > int(os.environ["EXPECTED_INTRINSICS_MIN"]), f"unexpected intrinsic count: {intrinsics}"
          assert instructions > int(os.environ["EXPECTED_INSTRUCTIONS_MIN"]), f"unexpected instruction count: {instructions}"

          search_index = WEB_DIR / "search-index.json"
          intrinsic_details = WEB_DIR / "intrinsic-details.json"
          assert search_index.exists(), f"missing {search_index}"
          assert intrinsic_details.exists(), f"missing {intrinsic_details}"

          payload = json.loads(search_index.read_text())
          assert len(payload.get("intrinsics", [])) == intrinsics
          assert len(payload.get("instructions", [])) == instructions
          assert "isa_config" in payload
          PY

  package:
    needs: tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v8.0.0
        with:
          enable-cache: true
          activate-environment: true
          python-version: "3.12"

      - name: Build distributables
        run: uv build
