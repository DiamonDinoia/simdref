name: CI

on:
  pull_request:
  push:
    branches-ignore:
      - gh-pages

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true
          activate-environment: true
          python-version: "3.12"

      - name: Install package and test dependencies
        run: uv pip install -e . pytest

      - name: Cache catalog for tests
        id: catalog-cache
        uses: actions/cache@v5
        with:
          path: |
            data/derived/catalog.msgpack
            data/derived/catalog.db
            data/derived/web
          key: ci-catalog-${{ runner.os }}-${{ hashFiles('src/simdref/**', 'data/sources/**', 'tools/vendor_riscv_sources.py', 'pyproject.toml') }}

      - name: Install LLVM 22 toolchain (cache miss)
        if: steps.catalog-cache.outputs.cache-hit != 'true'
        run: |
          wget -qO /tmp/llvm.sh https://apt.llvm.org/llvm.sh
          chmod +x /tmp/llvm.sh
          sudo /tmp/llvm.sh 22
          echo "/usr/lib/llvm-22/bin" >> "$GITHUB_PATH"

      - name: Vendor RISC-V sources (cache miss)
        if: steps.catalog-cache.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 https://github.com/riscv/riscv-unified-db /tmp/riscv-unified-db
          git clone --depth 1 https://github.com/riscv-non-isa/riscv-rvv-intrinsic-doc /tmp/riscv-rvv-intrinsic-doc
          python tools/vendor_riscv_sources.py

      - name: Build catalog locally (cache miss)
        if: steps.catalog-cache.outputs.cache-hit != 'true'
        run: python -u -m simdref build --with-sdm --man-dir "$RUNNER_TEMP/man"

      - name: Run Python test suite
        run: python -m pytest tests

      - name: Check Python syntax
        run: python -m py_compile src/simdref/cli.py src/simdref/display.py src/simdref/ingest.py src/simdref/pdfparse/base.py src/simdref/pdfparse/intel.py src/simdref/tui.py src/simdref/web.py

      - name: Check web syntax
        run: node --check src/simdref/templates/app.js

  runtime-build:
    name: Runtime Validation
    needs: tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        label: [local-sdm]
        include:
          - label: local-sdm
            build_command: simdref build --with-sdm --man-dir "$RUNNER_TEMP/man"
            intrinsics_min: 7000
            instructions_min: 20000
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true
          activate-environment: true
          python-version: "3.12"

      - name: Install LLVM 22 toolchain (for --build matrix)
        if: matrix.label == 'local-sdm'
        run: |
          wget -qO /tmp/llvm.sh https://apt.llvm.org/llvm.sh
          chmod +x /tmp/llvm.sh
          sudo /tmp/llvm.sh 22
          echo "/usr/lib/llvm-22/bin" >> "$GITHUB_PATH"

      - name: Install package
        run: uv pip install -e .

      - name: Vendor RISC-V sources (for --build matrix)
        if: matrix.label == 'local-sdm'
        run: |
          git clone --depth 1 https://github.com/riscv/riscv-unified-db /tmp/riscv-unified-db
          git clone --depth 1 https://github.com/riscv-non-isa/riscv-rvv-intrinsic-doc /tmp/riscv-rvv-intrinsic-doc
          python tools/vendor_riscv_sources.py

      - name: Build runtime (${{ matrix.label }})
        run: ${{ matrix.build_command }}

      - name: Validate upstream source ingestion (${{ matrix.label }})
        if: matrix.label == 'local-sdm'
        run: python tools/validate_sources.py --require-sdm

      - name: Inspect runtime (${{ matrix.label }})
        run: simdref doctor

      - name: Validate runtime artifacts (${{ matrix.label }})
        env:
          EXPECTED_INTRINSICS_MIN: ${{ matrix.intrinsics_min }}
          EXPECTED_INSTRUCTIONS_MIN: ${{ matrix.instructions_min }}
        run: |
          python - <<'PY'
          import os
          import json
          from simdref.storage import SQLITE_PATH, WEB_DIR, open_db, sqlite_schema_is_current

          assert sqlite_schema_is_current(), "SQLite schema is not current after update"
          with open_db(SQLITE_PATH) as conn:
              intrinsics = conn.execute("select count(*) from intrinsics_data").fetchone()[0]
              instructions = conn.execute("select count(*) from instructions_data").fetchone()[0]
          assert intrinsics > int(os.environ["EXPECTED_INTRINSICS_MIN"]), f"unexpected intrinsic count: {intrinsics}"
          assert instructions > int(os.environ["EXPECTED_INSTRUCTIONS_MIN"]), f"unexpected instruction count: {instructions}"

          search_index = WEB_DIR / "search-index.json"
          intrinsic_chunks = WEB_DIR / "intrinsic-chunks"
          assert search_index.exists(), f"missing {search_index}"
          assert intrinsic_chunks.is_dir(), f"missing {intrinsic_chunks}"
          chunk_files = sorted(intrinsic_chunks.glob("*.json"))
          assert chunk_files, f"no chunk files under {intrinsic_chunks}"
          chunked_names = set()
          for p in chunk_files:
              chunked_names.update(json.loads(p.read_text()).keys())
          # Chunks are keyed by intrinsic name (case-sensitive), while the
          # intrinsics_data table uses COLLATE NOCASE on `name`. Don't
          # pin an exact equality; verify a sensible lower bound and that
          # every chunk-name actually exists in the DB.
          assert chunked_names, "intrinsic chunks contained no names"
          assert len(chunked_names) <= intrinsics, (
              f"chunk names exceed SQLite rows: {len(chunked_names)} > {intrinsics}"
          )

          payload = json.loads(search_index.read_text())
          assert len(payload.get("intrinsics", [])) == intrinsics
          assert len(payload.get("instructions", [])) == instructions
          assert "isa_config" in payload
          PY

  package:
    needs: tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true
          activate-environment: true
          python-version: "3.12"

      - name: Build distributables
        run: uv build
