name: Bump Version

# Human-dispatched version bump. Runs scripts/bump-version.py on a fresh
# main checkout, commits, pushes. After the bump lands and CI goes green
# on the new HEAD, dispatch release-candidate.yml with the same version
# to tag; the tag push triggers release.yml which publishes to PyPI.
#
# Single click; no need to edit pyproject.toml locally.

on:
  workflow_dispatch:
    inputs:
      version:
        required: true
        description: "Version to bump to (e.g. 0.2.0). Must not be already on PyPI."
      dry_run:
        type: boolean
        default: true
        description: "If true, show the diff but do not commit or push."

permissions:
  contents: write

concurrency:
  group: bump-version
  cancel-in-progress: false

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: main

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Refuse if tag already exists
        run: |
          if git rev-parse "v${{ inputs.version }}" >/dev/null 2>&1; then
            echo "::error::tag v${{ inputs.version }} already exists; pick a new version"
            exit 1
          fi

      - name: Refuse if version is already on PyPI
        run: |
          status=$(curl -s -o /dev/null -w '%{http_code}' "https://pypi.org/pypi/simdref/${{ inputs.version }}/json")
          echo "pypi-status=$status"
          if [ "$status" = "200" ]; then
            echo "::error::version ${{ inputs.version }} is already published on PyPI"
            exit 1
          fi

      - name: Bump version across pyproject + .claude-plugin
        run: python scripts/bump-version.py "${{ inputs.version }}"

      - name: Verify cross-file sync
        run: python scripts/check-version-sync.py

      - name: Show diff
        run: git --no-pager diff

      - name: Commit and push
        if: ${{ !inputs.dry_run }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml .claude-plugin/
          git commit -m "chore(release): bump version to ${{ inputs.version }}"
          git push origin HEAD:main

      - name: Next step hint
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            echo "::notice::dry run — re-dispatch with dry_run=false to actually commit."
          else
            echo "::notice::version bumped and pushed. Wait for CI to go green, then dispatch release-candidate.yml with version=${{ inputs.version }} and dry_run=false to cut the tag."
          fi
