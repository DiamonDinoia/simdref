name: Release Candidate

# Human-dispatched release gate. Verifies that the current HEAD has a
# green CI run, validates version/tag/PyPI preconditions, builds and
# smoke-tests the wheel, and — only when dry_run=false — pushes the
# v<version> tag. The tag push then triggers release.yml (PyPI publish)
# and re-triggers ci.yml under the release event (publishes data-v<ver>).
#
# Default dry_run=true — first run is a no-side-effect validation.

on:
  workflow_dispatch:
    inputs:
      version:
        required: true
        description: "Version to release (e.g. 0.0.0). Must match pyproject.toml."
      dry_run:
        type: boolean
        default: true
        description: "If true, do all checks but don't create the tag."

permissions:
  contents: read
  actions: read

concurrency:
  group: release-candidate-${{ inputs.version }}
  cancel-in-progress: false

jobs:
  preflight:
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ steps.capture.outputs.sha }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Verify pyproject matches input
        run: |
          pyver=$(python -c "import tomllib, pathlib; print(tomllib.loads(pathlib.Path('pyproject.toml').read_text())['project']['version'])")
          echo "pyproject=$pyver input=${{ inputs.version }}"
          if [ "$pyver" != "${{ inputs.version }}" ]; then
            echo "::error::pyproject.toml version ($pyver) does not match input (${{ inputs.version }})"
            exit 1
          fi

      - name: Verify .claude-plugin metadata matches pyproject
        run: python scripts/check-version-sync.py

      - name: Refuse if tag already exists
        run: |
          if git rev-parse "v${{ inputs.version }}" >/dev/null 2>&1; then
            echo "::error::tag v${{ inputs.version }} already exists"
            exit 1
          fi

      - name: Refuse if version is already on PyPI
        run: |
          status=$(curl -s -o /dev/null -w '%{http_code}' "https://pypi.org/pypi/simdref/${{ inputs.version }}/json")
          echo "pypi-status=$status"
          if [ "$status" = "200" ]; then
            echo "::error::version ${{ inputs.version }} is already published on PyPI"
            exit 1
          fi

      - name: Require green CI on this commit
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Find the most recent CI workflow run for this exact SHA and
          # require it to have concluded successfully. No green CI → no tag.
          sha="${{ github.sha }}"
          run_json=$(gh api "repos/${{ github.repository }}/actions/workflows/ci.yml/runs?head_sha=$sha&per_page=5" \
            --jq '[.workflow_runs[] | select(.event=="push" or .event=="workflow_dispatch" or .event=="schedule")][0] // empty')
          if [ -z "$run_json" ]; then
            echo "::error::no CI workflow run found for $sha — push first and wait for CI before cutting a release"
            exit 1
          fi
          status=$(echo "$run_json" | jq -r .status)
          conclusion=$(echo "$run_json" | jq -r .conclusion)
          echo "ci status=$status conclusion=$conclusion"
          if [ "$status" != "completed" ] || [ "$conclusion" != "success" ]; then
            echo "::error::CI for $sha is not green (status=$status conclusion=$conclusion)"
            exit 1
          fi

      - id: capture
        run: echo "sha=${{ github.sha }}" >> "$GITHUB_OUTPUT"

  build-wheel:
    needs: preflight
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          activate-environment: true
          python-version: "3.12"

      - run: uv build

      - name: Check distribution metadata
        run: |
          uv pip install twine
          twine check dist/*

      - uses: actions/upload-artifact@v7
        with:
          name: wheel
          path: dist/

  install-smoke:
    needs: build-wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v5
        with:
          name: wheel
          path: dist/

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install wheel into a fresh interpreter
        run: |
          python -m pip install --upgrade pip
          python -m pip install dist/*.whl
          simdref --version
          simdref doctor || true

  tag:
    needs: install-smoke
    if: ${{ !inputs.dry_run }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ needs.preflight.outputs.sha }}

      - name: Create and push tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v${{ inputs.version }}" -m "Release v${{ inputs.version }}"
          git push origin "v${{ inputs.version }}"
