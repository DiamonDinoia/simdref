name: Release

# Atomic human-dispatched release.
#
# The tag `v<version>` is created ONLY after every step that can
# plausibly fail has succeeded: preflight → build → smoke →
# PyPI publish → tag push → GitHub Release create. If anything upstream
# fails, the tag is never pushed, so v<version> is a reliable marker for
# "this release is complete and on PyPI".
#
# Dispatch with dry_run=true to prove every gate without side effects
# (no PyPI publish, no tag, no GitHub Release).
#
# Preconditions handled by the `preflight` job:
#   - pyproject.toml version matches the `version` input
#   - .claude-plugin/marketplace.json and plugin.json versions match
#   - v<version> tag does not already exist
#   - <version> is not already on PyPI
#   - the HEAD commit has a green CI run
#
# IMPORTANT: first run requires the `simdref` project on PyPI configured
# with trusted publishing for this workflow file. See:
#   https://docs.pypi.org/trusted-publishers/
#   - Owner:            DiamonDinoia
#   - Repository:       simdref
#   - Workflow name:    release-candidate.yml
#   - Environment name: pypi

on:
  workflow_dispatch:
    inputs:
      version:
        required: true
        description: "Version to release (e.g. 0.0.0). Must match pyproject.toml."
      dry_run:
        type: boolean
        default: true
        description: "If true, run every check and build but skip PyPI publish, tag, and GitHub Release."

permissions:
  contents: read
  actions: read

concurrency:
  group: release-${{ inputs.version }}
  cancel-in-progress: false

jobs:
  preflight:
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ steps.capture.outputs.sha }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Verify pyproject matches input
        run: |
          pyver=$(python -c "import tomllib, pathlib; print(tomllib.loads(pathlib.Path('pyproject.toml').read_text())['project']['version'])")
          echo "pyproject=$pyver input=${{ inputs.version }}"
          if [ "$pyver" != "${{ inputs.version }}" ]; then
            echo "::error::pyproject.toml version ($pyver) does not match input (${{ inputs.version }})"
            exit 1
          fi

      - name: Verify .claude-plugin metadata matches pyproject
        run: |
          if ! python scripts/check-version-sync.py; then
            echo "::error::plugin metadata out of sync. Dispatch the Bump Version workflow with version=${{ inputs.version }}, or run scripts/bump-version.py ${{ inputs.version }} locally."
            exit 1
          fi

      - name: Refuse if tag already exists
        run: |
          if git rev-parse "v${{ inputs.version }}" >/dev/null 2>&1; then
            echo "::error::tag v${{ inputs.version }} already exists"
            exit 1
          fi

      - name: Refuse if version is already on PyPI
        run: |
          status=$(curl -s -o /dev/null -w '%{http_code}' "https://pypi.org/pypi/simdref/${{ inputs.version }}/json")
          echo "pypi-status=$status"
          if [ "$status" = "200" ]; then
            echo "::error::version ${{ inputs.version }} is already published on PyPI"
            exit 1
          fi

      - name: Require green CI on this commit
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          sha="${{ github.sha }}"
          run_json=$(gh api "repos/${{ github.repository }}/actions/workflows/ci.yml/runs?head_sha=$sha&per_page=5" \
            --jq '[.workflow_runs[] | select(.event=="push" or .event=="workflow_dispatch" or .event=="schedule")][0] // empty')
          if [ -z "$run_json" ]; then
            echo "::error::no CI workflow run found for $sha — push first and wait for CI before cutting a release"
            exit 1
          fi
          status=$(echo "$run_json" | jq -r .status)
          conclusion=$(echo "$run_json" | jq -r .conclusion)
          echo "ci status=$status conclusion=$conclusion"
          if [ "$status" != "completed" ] || [ "$conclusion" != "success" ]; then
            echo "::error::CI for $sha is not green (status=$status conclusion=$conclusion)"
            exit 1
          fi

      - id: capture
        run: echo "sha=${{ github.sha }}" >> "$GITHUB_OUTPUT"

  build-wheel:
    needs: preflight
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          activate-environment: true
          python-version: "3.12"

      - run: uv build

      - name: Check distribution metadata
        run: |
          uv pip install twine
          twine check dist/*

      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  install-smoke:
    needs: build-wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v5
        with:
          name: dist
          path: dist/

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install wheel into a fresh interpreter
        run: |
          python -m pip install --upgrade pip
          python -m pip install dist/*.whl
          simdref --version
          simdref doctor || true

  # Tag + PyPI publish live in the SAME job so they share a success
  # boundary: if PyPI publish fails, the tag is rolled back immediately.
  # Failure semantics:
  #   - tag push fails  -> PyPI never attempted, nothing to undo
  #   - PyPI fails      -> tag deleted from origin, job reports failure
  #   - both succeed    -> tag stands, release is on PyPI
  # There is a ~seconds window where the tag exists before PyPI settles,
  # but if publish fails the rollback step removes it. "Tag exists" is
  # therefore a reliable signal that the release is on PyPI.
  publish-and-tag:
    needs: [preflight, install-smoke]
    if: ${{ !inputs.dry_run }}
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/simdref
    permissions:
      id-token: write   # PyPI OIDC trusted publishing
      contents: write   # tag push
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ needs.preflight.outputs.sha }}

      - uses: actions/download-artifact@v5
        with:
          name: dist
          path: dist/

      - name: Create and push tag
        id: tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v${{ inputs.version }}" -m "Release v${{ inputs.version }}"
          git push origin "v${{ inputs.version }}"
          echo "pushed=true" >> "$GITHUB_OUTPUT"

      - name: Publish to PyPI
        id: pypi
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Rollback tag on PyPI failure
        if: failure() && steps.tag.outputs.pushed == 'true'
        run: |
          echo "::warning::PyPI publish failed — deleting tag v${{ inputs.version }} to keep the tag/release invariant"
          git push --delete origin "v${{ inputs.version }}" || true

  # Best-effort: GitHub Release creation uses the tag that now exists.
  # If this step fails the tag + PyPI are still intact and the release
  # page can be created by hand via `gh release create v<version> ...`.
  github-release:
    needs: [preflight, publish-and-tag]
    if: ${{ !inputs.dry_run }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.preflight.outputs.sha }}

      - uses: actions/download-artifact@v5
        with:
          name: dist
          path: dist/

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="v${{ inputs.version }}"
          if [ -f CHANGELOG.md ]; then
            gh release create "$tag" \
              --title "simdref $tag" \
              --notes-file CHANGELOG.md \
              dist/*
          else
            gh release create "$tag" \
              --title "simdref $tag" \
              --generate-notes \
              dist/*
          fi
