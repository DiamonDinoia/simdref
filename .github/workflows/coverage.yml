name: Coverage audit

# Re-runs tools/audit_coverage.py against live upstream feeds and opens a
# PR if docs/coverage/summary.json drifts. Offline CI (ci.yml) enforces the
# thresholds committed in docs/coverage/thresholds.toml on every PR, so
# this job only needs to refresh the committed snapshot when upstreams or
# the local catalog change.
#
# Triggers:
#   - workflow_run on CI (main, success) → rebuild data ⇒ re-audit.
#   - schedule (weekly) → catch upstream-only drift when main is idle.
#   - workflow_dispatch → manual.

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  schedule:
    - cron: '0 5 * * 1'  # 05:00 UTC Monday — weekly safety net
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  audit:
    if: >-
      github.event_name != 'workflow_run'
      || (github.event.workflow_run.conclusion == 'success'
          && github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          activate-environment: true
          python-version: "3.12"

      - name: Install LLVM nightly toolchain
        run: |
          wget -qO /tmp/llvm.sh https://apt.llvm.org/llvm.sh
          chmod +x /tmp/llvm.sh
          sudo /tmp/llvm.sh 23
          echo "/usr/lib/llvm-23/bin" >> "$GITHUB_PATH"

      - name: Install package
        run: uv pip install -e .

      - name: Vendor RISC-V sources
        # Mirrors ci.yml:build-catalog. `simdref build` otherwise fetches
        # these feeds live and is flaky when upstream momentarily 404s.
        run: |
          git clone --depth 1 https://github.com/riscv/riscv-unified-db /tmp/riscv-unified-db
          git clone --depth 1 https://github.com/riscv-non-isa/riscv-rvv-intrinsic-doc /tmp/riscv-rvv-intrinsic-doc
          python tools/vendor_riscv_sources.py

      - name: Build local catalog
        run: python -u -m simdref build

      - name: Re-run coverage audit
        run: python tools/audit_coverage.py fetch

      - name: Detect drift
        id: drift
        run: |
          if ! git diff --quiet docs/coverage/; then
            echo "drift=true" >> "$GITHUB_OUTPUT"
            echo "=== coverage drift detected ==="
            git --no-pager diff docs/coverage/ | head -200
          else
            echo "drift=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Open PR on drift
        id: cpr
        if: steps.drift.outputs.drift == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          branch: coverage-drift
          commit-message: "chore: refresh docs/coverage/ snapshot"
          title: "chore: coverage drift"
          body: |
            Automated upstream parity audit detected coverage drift.
            See `docs/coverage/summary.json` for the updated per-source numbers.
            If any source also tripped a threshold, the parent workflow run
            is red — review the numbers before merging this PR.
          add-paths: docs/coverage/

      - name: Enable auto-merge on the drift PR
        if: steps.cpr.outputs.pull-request-number
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.cpr.outputs.pull-request-number }}
        run: |
          gh pr merge "$PR_NUMBER" --auto --squash --delete-branch || true

      - name: Enforce committed thresholds
        # Runs last so a drift PR still gets opened even when a source
        # regressed below its floor. Previously `continue-on-error: true`
        # masked this check entirely — keeping it loud is the whole point.
        run: python tools/audit_coverage.py diff
