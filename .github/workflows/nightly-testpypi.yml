name: Nightly TestPyPI

# Publishes a dated dev build of the wheel to TestPyPI at 00:00 UTC every day,
# but only if main received new commits in the previous 24 hours. Replaces the
# per-push wheel publishing previously kept inside Build Data & Deploy.

on:
  schedule:
    - cron: "0 0 * * *"  # 00:00 UTC daily
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  check-activity:
    runs-on: ubuntu-latest
    outputs:
      proceed: ${{ steps.check.outputs.proceed }}
      stamp: ${{ steps.check.outputs.stamp }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: main

      - name: Detect new commits on main in last 24h
        id: activity
        run: |
          since=$(date -u -d "24 hours ago" +%Y-%m-%dT%H:%M:%SZ)
          count=$(git log --since="$since" --pretty=oneline main | wc -l)
          echo "Commits on main since $since: $count"
          if [ "$count" -gt 0 ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Require latest CI run on main to be green
        id: ci_status
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          conclusion=$(gh run list \
            --workflow=ci.yml \
            --branch=main \
            --status=completed \
            --limit 1 \
            --json conclusion \
            --jq '.[0].conclusion // "missing"')
          echo "latest CI conclusion on main: $conclusion"
          echo "conclusion=$conclusion" >> "$GITHUB_OUTPUT"

      - name: Decide whether to proceed
        id: check
        run: |
          if [ "${{ steps.activity.outputs.changed }}" = "true" ] \
             && [ "${{ steps.ci_status.outputs.conclusion }}" = "success" ]; then
            echo "proceed=true" >> "$GITHUB_OUTPUT"
          else
            echo "proceed=false" >> "$GITHUB_OUTPUT"
            echo "skipping: activity=${{ steps.activity.outputs.changed }} ci=${{ steps.ci_status.outputs.conclusion }}"
          fi
          echo "stamp=$(date -u +%Y%m%d)" >> "$GITHUB_OUTPUT"

  publish:
    needs: check-activity
    if: needs.check-activity.outputs.proceed == 'true'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    environment:
      name: testpypi
      url: https://test.pypi.org/p/simdref
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          activate-environment: true
          python-version: "3.12"

      - name: Stamp dev version
        env:
          STAMP: ${{ needs.check-activity.outputs.stamp }}
        run: |
          python - <<'PY'
          import os, pathlib, re
          stamp = os.environ["STAMP"]
          path = pathlib.Path("pyproject.toml")
          text = path.read_text()
          new_text, n = re.subn(
              r'^version = "([^"]+)"',
              lambda m: f'version = "{m.group(1)}.dev{stamp}"',
              text,
              count=1,
              flags=re.M,
          )
          if n != 1:
              raise SystemExit("failed to stamp version in pyproject.toml")
          path.write_text(new_text)
          init = pathlib.Path("src/simdref/__init__.py")
          init.write_text(
              re.sub(
                  r'^__version__ = "([^"]+)"',
                  lambda m: f'__version__ = "{m.group(1)}.dev{stamp}"',
                  init.read_text(),
                  count=1,
                  flags=re.M,
              )
          )
          PY

      - name: Build wheel and sdist
        run: uv build

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true
