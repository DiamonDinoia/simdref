name: Build Data & Deploy

on:
  schedule:
    - cron: "0 0 * * 1" # Weekly Monday midnight UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -e .

      - name: Build catalog from upstream
        run: simdref update

      - name: Export static web app
        run: simdref export-web

      - name: Upload catalog as release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: data-latest
          name: Latest Data Build
          prerelease: true
          files: |
            data/derived/catalog.json
            data/derived/catalog.db
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/

  build-wheel:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install build

      - run: python -m build

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheel
          path: dist/

      - name: Attach wheel to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: data-latest
          files: dist/*.whl
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy-pages:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
