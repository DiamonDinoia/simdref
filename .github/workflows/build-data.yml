name: Build Data & Deploy

on:
  schedule:
    - cron: "0 0 * * 1" # Weekly Monday midnight UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      data_tag: ${{ steps.meta.outputs.data_tag }}
      schema_tag: ${{ steps.meta.outputs.schema_tag }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -e .

      - name: Compute data release tags
        id: meta
        run: |
          VERSION=$(python - <<'PY'
          from simdref import __version__
          print(__version__)
          PY
          )
          SCHEMA=$(python - <<'PY'
          from simdref.storage import SQLITE_SCHEMA_VERSION
          print(SQLITE_SCHEMA_VERSION)
          PY
          )
          echo "data_tag=data-v${VERSION}-schema${SCHEMA}" >> "$GITHUB_OUTPUT"
          echo "schema_tag=data-schema${SCHEMA}-latest" >> "$GITHUB_OUTPUT"

      - name: Build catalog from upstream
        run: simdref update --build-local --with-sdm

      - name: Upload versioned catalog release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.data_tag }}
          name: Data Build ${{ steps.meta.outputs.data_tag }}
          prerelease: true
          files: |
            data/derived/catalog.msgpack
            data/derived/catalog.db
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload schema-compatible catalog release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.schema_tag }}
          name: Latest Schema-Compatible Data Build
          prerelease: true
          files: |
            data/derived/catalog.msgpack
            data/derived/catalog.db
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload latest catalog release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: data-latest
          name: Latest Data Build
          prerelease: true
          files: |
            data/derived/catalog.msgpack
            data/derived/catalog.db
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/

  build-wheel:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install build

      - run: python -m build

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheel
          path: dist/

      - name: Attach wheel to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: data-latest
          files: dist/*.whl
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-testpypi:
    needs: build-wheel
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    environment:
      name: testpypi
      url: https://test.pypi.org/p/simdref
    steps:
      - name: Download wheel
        uses: actions/download-artifact@v4
        with:
          name: wheel
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  deploy-pages:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
