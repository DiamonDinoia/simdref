name: Build Data & Deploy

on:
  schedule:
    - cron: "0 0 * * 1" # Weekly Monday midnight UTC
  workflow_dispatch:
    inputs:
      run_build:
        description: "Run the expensive upstream data build on this ref"
        required: false
        default: false
        type: boolean
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  build:
    if: github.event_name == 'schedule' || github.event_name == 'release' || github.ref_name == github.event.repository.default_branch || github.event.inputs.run_build == 'true'
    runs-on: ubuntu-latest
    env:
      PYTHONUNBUFFERED: "1"
    outputs:
      data_tag: ${{ steps.meta.outputs.data_tag }}
      publish_mutable: ${{ steps.meta.outputs.publish_mutable }}
      publish_versioned: ${{ steps.meta.outputs.publish_versioned }}
      is_prerelease: ${{ steps.meta.outputs.is_prerelease }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v8.0.0
        with:
          enable-cache: true
          activate-environment: true
          python-version: "3.12"

      - name: Install LLVM 22 toolchain
        # Ubuntu 24.04 only ships llvm-18, but the scheduling pipeline
        # needs ``llvm-mca --instruction-tables=full`` (LLVM 19+) and is
        # validated locally against LLVM 22. KyleMayes/install-llvm-action
        # doesn't ship LLVM 22 for linux/x64, so fetch from apt.llvm.org.
        run: |
          wget -qO /tmp/llvm.sh https://apt.llvm.org/llvm.sh
          chmod +x /tmp/llvm.sh
          sudo /tmp/llvm.sh 22
          echo "/usr/lib/llvm-22/bin" >> "$GITHUB_PATH"

      - name: Verify LLVM binaries
        run: |
          llvm-mca --version
          llvm-mc --version
          llvm-exegesis --version

      - name: Restore Intel SDM description cache
        uses: actions/cache@v5
        with:
          path: data/derived/intel-sdm-descriptions.msgpack
          key: intel-sdm-descriptions-${{ runner.os }}-${{ hashFiles('src/simdref/ingest.py', 'src/simdref/pdfparse/*.py') }}

      - name: Restore modeled-perf cache
        id: perf-cache
        uses: actions/cache@v5
        with:
          path: vendor/perf-cache
          key: perf-cache-${{ runner.os }}-${{ hashFiles('pyproject.toml', 'src/simdref/perf_sources/llvm_scheduling.py', 'src/simdref/perf_sources/cores.py') }}

      - run: uv pip install -e .

      - name: Vendor RISC-V sources
        # Upstream doesn't publish machine-readable JSON for either the
        # unified-db instruction tables or the RVV intrinsic doc. Clone
        # both repos and run the project's vendor script to build the
        # JSON bundles under vendor/riscv/ that the ingester expects.
        run: |
          git clone --depth 1 https://github.com/riscv/riscv-unified-db /tmp/riscv-unified-db
          git clone --depth 1 https://github.com/riscv-non-isa/riscv-rvv-intrinsic-doc /tmp/riscv-rvv-intrinsic-doc
          python tools/vendor_riscv_sources.py

      - name: Compute data release tags
        id: meta
        run: |
          VERSION=$(python - <<'PY'
          from simdref import __version__
          print(__version__)
          PY
          )
          echo "data_tag=data-v${VERSION}" >> "$GITHUB_OUTPUT"
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "publish_versioned=true" >> "$GITHUB_OUTPUT"
            echo "publish_mutable=true" >> "$GITHUB_OUTPUT"
            if [ "${{ github.event.release.prerelease }}" = "true" ]; then
              echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
            else
              echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
            fi
          elif [ "${{ github.ref_name }}" = "${{ github.event.repository.default_branch }}" ]; then
            echo "publish_versioned=false" >> "$GITHUB_OUTPUT"
            echo "publish_mutable=true" >> "$GITHUB_OUTPUT"
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "publish_versioned=false" >> "$GITHUB_OUTPUT"
            echo "publish_mutable=false" >> "$GITHUB_OUTPUT"
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Build catalog from upstream
        run: python -u -m simdref build --with-sdm

      - name: Validate upstream source ingestion
        run: python tools/validate_sources.py --require-sdm

      - name: Assert catalog carries measured + modeled perf rows
        run: |
          python - <<'PY'
          import msgpack
          from pathlib import Path
          data = msgpack.unpackb(Path("data/derived/catalog.msgpack").read_bytes(), raw=False)
          instructions = data.get("instructions") or []
          measured = modeled = 0
          for inst in instructions:
              for entry in (inst.get("arch_details") or {}).values():
                  if not isinstance(entry, dict):
                      continue
                  kind = entry.get("source_kind")
                  # Legacy uops.info rows predate the ``source_kind``
                  # field and are always measured.
                  if kind == "modeled":
                      modeled += 1
                  else:
                      measured += 1
          print(f"measured arch_details rows: {measured}")
          print(f"modeled  arch_details rows: {modeled}")
          assert measured >= 1000, f"too few measured rows: {measured}"
          assert modeled >= 1000, f"too few modeled rows: {modeled}"
          PY

      - name: Package perf cache
        if: steps.meta.outputs.publish_mutable == 'true'
        run: |
          if [ -d vendor/perf-cache ]; then
            tar --zstd -cf perf-cache.tar.zst -C vendor perf-cache
          else
            echo "vendor/perf-cache missing; skipping archive"
          fi

      - name: Upload versioned catalog release assets
        if: steps.meta.outputs.publish_versioned == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.data_tag }}
          name: Data Build ${{ steps.meta.outputs.data_tag }}
          prerelease: ${{ steps.meta.outputs.is_prerelease }}
          files: |
            data/derived/catalog.msgpack
            data/derived/catalog.db
            perf-cache.tar.zst
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload latest catalog release assets
        if: steps.meta.outputs.publish_mutable == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: data-latest
          name: Latest Data Build
          prerelease: true
          files: |
            data/derived/catalog.msgpack
            data/derived/catalog.db
            perf-cache.tar.zst
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-wheel:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    env:
      PYTHONUNBUFFERED: "1"
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v8.0.0
        with:
          enable-cache: true
          activate-environment: true
          python-version: "3.12"

      - run: uv build

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v7
        with:
          name: wheel
          path: dist/

      - name: Attach wheel to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: dist/*.whl
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

