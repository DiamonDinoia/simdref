name: Build Data & Deploy

on:
  schedule:
    - cron: "0 0 * * 1" # Weekly Monday midnight UTC
  workflow_dispatch:
    inputs:
      run_build:
        description: "Run the expensive upstream data build on this ref"
        required: false
        default: false
        type: boolean
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  build:
    if: github.event_name == 'schedule' || github.event_name == 'release' || github.ref_name == github.event.repository.default_branch || github.event.inputs.run_build == 'true'
    runs-on: ubuntu-latest
    env:
      PYTHONUNBUFFERED: "1"
    outputs:
      data_tag: ${{ steps.meta.outputs.data_tag }}
      schema_tag: ${{ steps.meta.outputs.schema_tag }}
      publish_mutable: ${{ steps.meta.outputs.publish_mutable }}
      publish_versioned: ${{ steps.meta.outputs.publish_versioned }}
      is_prerelease: ${{ steps.meta.outputs.is_prerelease }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v8.0.0
        with:
          enable-cache: true
          activate-environment: true
          python-version: "3.12"

      - name: Restore Intel SDM description cache
        uses: actions/cache@v5
        with:
          path: data/derived/intel-sdm-descriptions.msgpack
          key: intel-sdm-descriptions-${{ runner.os }}-${{ hashFiles('src/simdref/ingest.py', 'src/simdref/pdfparse/*.py') }}

      - run: uv pip install -e .

      - name: Compute data release tags
        id: meta
        run: |
          VERSION=$(python - <<'PY'
          from simdref import __version__
          print(__version__)
          PY
          )
          SCHEMA=$(python - <<'PY'
          from simdref.storage import SQLITE_SCHEMA_VERSION
          print(SQLITE_SCHEMA_VERSION)
          PY
          )
          echo "data_tag=data-v${VERSION}-schema${SCHEMA}" >> "$GITHUB_OUTPUT"
          echo "schema_tag=data-schema${SCHEMA}-latest" >> "$GITHUB_OUTPUT"
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "publish_versioned=true" >> "$GITHUB_OUTPUT"
            echo "publish_mutable=true" >> "$GITHUB_OUTPUT"
            if [ "${{ github.event.release.prerelease }}" = "true" ]; then
              echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
            else
              echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
            fi
          elif [ "${{ github.ref_name }}" = "${{ github.event.repository.default_branch }}" ]; then
            echo "publish_versioned=false" >> "$GITHUB_OUTPUT"
            echo "publish_mutable=true" >> "$GITHUB_OUTPUT"
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "publish_versioned=false" >> "$GITHUB_OUTPUT"
            echo "publish_mutable=false" >> "$GITHUB_OUTPUT"
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Build catalog from upstream
        run: python -u -m simdref update --build-local --with-sdm

      - name: Validate upstream source ingestion
        run: python tools/validate_sources.py --require-sdm

      - name: Upload versioned catalog release assets
        if: steps.meta.outputs.publish_versioned == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.data_tag }}
          name: Data Build ${{ steps.meta.outputs.data_tag }}
          prerelease: ${{ steps.meta.outputs.is_prerelease }}
          files: |
            data/derived/catalog.msgpack
            data/derived/catalog.db
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload schema-compatible catalog release assets
        if: steps.meta.outputs.publish_mutable == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.schema_tag }}
          name: Latest Schema-Compatible Data Build
          prerelease: true
          files: |
            data/derived/catalog.msgpack
            data/derived/catalog.db
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload latest catalog release assets
        if: steps.meta.outputs.publish_mutable == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: data-latest
          name: Latest Data Build
          prerelease: true
          files: |
            data/derived/catalog.msgpack
            data/derived/catalog.db
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-wheel:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    env:
      PYTHONUNBUFFERED: "1"
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v8.0.0
        with:
          enable-cache: true
          activate-environment: true
          python-version: "3.12"

      - run: uv build

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v7
        with:
          name: wheel
          path: dist/

      - name: Attach wheel to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: dist/*.whl
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

